<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<!-- Fixes Error 153: Helps YouTube verify your site identity -->
<meta name="referrer" content="no-referrer-when-downgrade">
<title>neovvy — Video Editor Portfolio</title>

<!-- LUCIDE ICONS (Modern & Lightweight) -->
<script src="https://unpkg.com/lucide@latest"></script>

<!-- SYSTEM FONT STACK (Apple/Modern) -->
<style>
/* =============================
   1. COLOR & THEME SETTINGS
============================== */
:root{
  --bg:#050505;
  --text:#ffffff;
  --card: rgba(255, 255, 255, 0.03);
  --card-border: rgba(255, 255, 255, 0.08);
  --accent:#6c5cff;
  --header-bg: rgba(11, 11, 15, 0.7);
  --glass-blur: 20px;
}

body.light{
  --bg:#fbfbfd;
  --text:#1d1d1f;
  --card: rgba(0, 0, 0, 0.02);
  --card-border: rgba(0, 0, 0, 0.05);
  --header-bg: rgba(255, 255, 255, 0.7);
}

*{margin:0;padding:0;box-sizing:border-box;scroll-behavior:smooth;}

body{
  /* Apple System Font Stack - San Francisco */
  font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", "SF Pro Display", "SF Pro", "Helvetica Neue", Arial, sans-serif;
  background:var(--bg);
  color:var(--text);
  transition:background .6s cubic-bezier(0.4, 0, 0.2, 1), color .6s cubic-bezier(0.4, 0, 0.2, 1);
  overflow-x:hidden;
  -webkit-font-smoothing: antialiased;
  -moz-osx-font-smoothing: grayscale;
}

/* =============================
   2. HEADER & NAVIGATION (Glass)
============================== */
header{
  position:fixed;
  width:100%;
  top:0;
  display:flex;
  justify-content:space-between;
  align-items:center;
  padding:18px 6%;
  background: var(--header-bg);
  backdrop-filter: blur(var(--glass-blur));
  -webkit-backdrop-filter: blur(var(--glass-blur));
  z-index: 2000;
  border-bottom: 1px solid var(--card-border);
  transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
}

header.music-active {
  background: rgba(108, 92, 255, 0.05);
  backdrop-filter: blur(40px);
}

.logo {
  text-decoration: none;
  color: var(--text);
  transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
  z-index: 2010;
}

.logo:hover { transform: scale(1.02); }
header h1{font-weight:700; font-size:22px; letter-spacing: -0.8px;}

.nav-actions { display: flex; align-items: center; gap: 12px; z-index: 2010; }

/* Desktop Navigation */
nav { 
  display: flex; 
  align-items: center; 
  gap: 30px; 
}

nav a{
  text-decoration:none;
  color:var(--text);
  opacity:0.5;
  font-weight:500;
  font-size: 14px;
  transition: all 0.3s ease;
  z-index: 10;
}

nav a:hover{opacity:1; color:var(--accent);}

/* FULL-WIDTH HEADER VISUALIZER */
.visualizer {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 100%;
  display: none; 
  align-items: flex-end;
  justify-content: space-between;
  padding: 0;
  pointer-events: none; 
  z-index: 1;
  opacity: 0.2; 
}

.visualizer.active { display: flex; }

.bar {
  flex: 1;
  margin: 0 1px;
  background: var(--accent);
  border-radius: 4px 4px 0 0;
  transform-origin: bottom;
  animation: bounce-large 1s ease-in-out infinite alternate;
}

@keyframes bounce-large {
  0% { transform: scaleY(0.05); opacity: 0.1; }
  100% { transform: scaleY(1); opacity: 0.6; }
}

/* Buttons Styling */
.icon-btn {
  background: none;
  border: none;
  color: var(--text);
  cursor: pointer;
  padding: 10px;
  border-radius: 50%;
  display: flex;
  align-items: center;
  transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
}

.icon-btn:hover { 
  background: var(--card-border); 
  transform: translateY(-2px);
}

.music-playing {
  color: var(--accent) !important;
  animation: musicPulse 2s infinite ease-in-out;
}

@keyframes musicPulse {
  0% { box-shadow: 0 0 0 0 rgba(108, 92, 255, 0.4); }
  70% { box-shadow: 0 0 0 15px rgba(108, 92, 255, 0); }
  100% { box-shadow: 0 0 0 0 rgba(108, 92, 255, 0); }
}

.menu-trigger { display: none; }

/* =============================
   3. VIDEO GRID & GLASS CARDS
============================== */
section{ padding: 140px 6% 80px; }

/* Special centering for Showreel section */
.center-section {
  display: flex;
  flex-direction: column;
  align-items: center;
  text-align: center;
}

.center-section .grid {
  display: flex;
  justify-content: center;
  width: 100%;
  max-width: 1000px;
}

.section-title, .reveal-text {
  opacity:0;
  transform:translateY(30px);
  transition: 1s cubic-bezier(0.2, 0.8, 0.2, 1);
}

.section-title{
  font-size: clamp(32px, 7vw, 56px);
  font-weight: 700;
  letter-spacing: -1.5px;
  margin-bottom:50px;
}

.section-title.visible, .reveal-text.visible { opacity:1; transform:translateY(0); }

.grid{
  display:grid;
  grid-template-columns: repeat(auto-fit, minmax(min(100%, 500px), 1fr));
  gap:35px;
}

.video-card {
  background: var(--card);
  backdrop-filter: blur(10px);
  -webkit-backdrop-filter: blur(10px);
  border: 1px solid var(--card-border);
  border-radius: 24px;
  overflow:hidden;
  aspect-ratio: 16/9;
  box-shadow: 0 4px 30px rgba(0, 0, 0, 0.1);
  opacity:0;
  transform:translateY(40px);
  transition: all 0.8s cubic-bezier(0.2, 0.8, 0.2, 1);
  width: 100%;
}

.video-card.visible { opacity:1; transform:translateY(0); }

.video-card:hover { 
  transform: translateY(-8px) scale(1.01); 
  border-color: var(--accent);
  box-shadow: 0 20px 40px rgba(0, 0, 0, 0.2); 
}

iframe, video { 
  width:100%; 
  height:100%; 
  border:none; 
  display: block; 
  object-fit: cover; 
}

/* =============================
   4. CONTACT & FOOTER
============================== */
.contact{ text-align:center; padding: 120px 6%; }

.socials{
  margin-top:50px;
  display:flex;
  justify-content:center;
  flex-wrap: wrap;
  gap:20px;
}

.socials a{
  display:flex;
  align-items:center;
  gap:10px;
  padding: 12px 24px;
  text-decoration:none;
  color:var(--text);
  background: var(--card);
  border: 1px solid var(--card-border);
  border-radius: 100px;
  font-weight: 600;
  font-size: 14px;
  letter-spacing: -0.2px;
  transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
}

.socials a:hover { 
  background: var(--accent); 
  color: white; 
  border-color: var(--accent);
  transform: translateY(-5px);
  box-shadow: 0 10px 20px rgba(108, 92, 255, 0.3);
}

footer{ text-align:center; padding:60px; opacity:0.4; font-size: 13px; font-weight: 500; letter-spacing: -0.2px; }

/* =============================
   5. MOBILE RESPONSIVE UI
============================== */
@media(max-width: 768px) {
  .menu-trigger { display: flex; }
  
  nav {
    position: fixed;
    top: 0;
    right: -100%;
    width: 85%;
    max-width: 320px;
    height: 100vh;
    background: var(--header-bg);
    backdrop-filter: blur(30px);
    -webkit-backdrop-filter: blur(30px);
    flex-direction: column;
    justify-content: center;
    align-items: flex-start;
    padding: 60px 40px;
    transition: 0.6s cubic-bezier(0.4, 0, 0.2, 1);
    z-index: 2000;
    border-left: 1px solid var(--card-border);
  }
  
  nav.active { right: 0; }

  nav.music-active {
    background: rgba(108, 92, 255, 0.08);
  }
  
  nav a { 
    font-size: 28px; 
    font-weight: 700;
    letter-spacing: -1px;
    width: 100%; 
    padding: 15px 0;
    opacity: 0.4;
  }

  .nav-overlay {
    position: fixed;
    top: 0;
    left: 0;
    width: 100vw;
    height: 100vh;
    background: rgba(0,0,0,0.3);
    backdrop-filter: blur(8px);
    opacity: 0;
    visibility: hidden;
    transition: 0.4s ease;
    z-index: 1500;
  }
  
  .nav-overlay.active { opacity: 1; visibility: visible; }

  .close-menu {
    position: absolute;
    top: 30px;
    right: 30px;
    display: block;
  }
}

@media(min-width: 769px) {
    .close-menu { display: none; }
}
</style>
</head>

<script>
// Safely initialize Lucide Icons
function initLucide() {
  if (typeof lucide !== 'undefined') {
    lucide.createIcons();
  } else {
    // If it fails, retry once after a short delay
    setTimeout(() => {
      if (typeof lucide !== 'undefined') lucide.createIcons();
    }, 500);
  }
}

// Randomize bar heights for visualizer on load
const bars = document.querySelectorAll('.bar');
bars.forEach((bar) => {
  const duration = (Math.random() * 0.4 + 0.6).toFixed(2);
  const delay = (Math.random() * 0.8).toFixed(2);
  const height = Math.floor(Math.random() * 65 + 15); 
  bar.style.animationDuration = `${duration}s`;
  bar.style.animationDelay = `${delay}s`;
  bar.style.height = `${height}%`;
});

// Run initialization
initLucide();

function toggleMenu() {
  const nav = document.getElementById('mainNav');
  const overlay = document.getElementById('overlay');
  nav.classList.toggle('active');
  overlay.classList.toggle('active');
}

function toggleMode(){
  document.body.classList.toggle('light');
  const themeIcon = document.getElementById('themeIcon');
  const isLight = document.body.classList.contains('light');
  themeIcon.setAttribute('data-lucide', isLight ? 'moon' : 'sun');
  initLucide();
}

const audio = document.getElementById('bgm');
const musicIcon = document.getElementById('musicIcon');
const visualizer = document.getElementById('visualizer');
const nav = document.getElementById('mainNav');
const header = document.getElementById('header');
const musicBtn = musicIcon.parentElement;
let isPlaying = false;

function toggleMusic() {
  if (isPlaying) {
    audio.pause();
    musicBtn.classList.remove('music-playing');
    visualizer.classList.remove('active');
    nav.classList.remove('music-active');
    header.classList.remove('music-active');
  } else {
    audio.play().catch(err => console.log("Interaction required"));
    musicBtn.classList.add('music-playing');
    visualizer.classList.add('active');
    nav.classList.add('music-active');
    header.classList.add('music-active');
  }
  isPlaying = !isPlaying;
}

const observerOptions = {
  threshold: 0.15,
  rootMargin: '0px 0px -80px 0px'
};

const revealObserver = new IntersectionObserver((entries) => {
  entries.forEach(entry => {
    if(entry.isIntersecting){
      entry.target.classList.add('visible');
      const video = entry.target.querySelector('video');
      if (video) video.play().catch(e => {});
    } else {
      const video = entry.target.querySelector('video');
      if (video) video.pause();
    }
  });
}, observerOptions);

document.querySelectorAll('.video-card, .section-title, .reveal-text').forEach(el => {
  revealObserver.observe(el);
});

document.querySelectorAll('nav a').forEach(link => {
  link.addEventListener('click', () => {
    document.getElementById('mainNav').classList.remove('active');
    document.getElementById('overlay').classList.remove('active');
  });
});
</script>
